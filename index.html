<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceklist Belanja Bumbu Dapur</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .strikethrough { text-decoration: line-through; color: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen pb-12">

    <div id="halaman-login" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-xl shadow-md border border-slate-100 max-w-sm w-full">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-emerald-700">Masuk Aplikasi</h2>
                <p class="text-xs text-slate-400 mt-1">Ceklist Belanja Bumbu Dapur</p>
            </div>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Username</label>
                    <input type="text" id="login-username" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-hidden">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-hidden">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg transition-colors text-sm shadow-xs mt-2">Log In</button>
            </form>
        </div>
    </div>

    <div id="halaman-utama" class="hidden">
        <header class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white py-6 px-4 shadow-md">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">Ceklist Belanja Bumbu Dapur</h1>
                    <p class="text-emerald-100 text-xs mt-1">Masuk sebagai: <span id="user-aktif" class="font-bold underline"></span> (<span id="role-aktif" class="italic"></span>)</p>
                </div>
                <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors shadow-xs">Keluar</button>
            </div>
        </header>

        <div id="navigasi-tab" class="bg-white border-b border-slate-200 sticky top-0 z-10 hidden">
            <div class="max-w-4xl mx-auto flex px-4">
                <button id="btn-tab-belanja" onclick="gantiTab('belanja')" class="border-b-2 border-emerald-600 text-emerald-600 py-4 px-6 text-sm font-bold transition-colors focus:outline-hidden">
                    🛒 Daftar Belanja
                </button>
                <button id="btn-tab-admin" onclick="gantiTab('admin')" class="border-b-2 border-transparent text-slate-500 hover:text-slate-700 py-4 px-6 text-sm font-semibold transition-colors focus:outline-hidden">
                    ⚙️ Manajemen User
                </button>
            </div>
        </div>

        <main class="max-w-4xl mx-auto px-4 mt-6">
            
            <div id="konten-belanja" class="space-y-6">
                <div class="bg-white rounded-xl shadow-xs border border-slate-100 p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="p-3 bg-slate-50 rounded-lg text-center"><span class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Total Item</span><span id="stat-total" class="text-2xl font-bold text-slate-800">0</span></div>
                    <div class="p-3 bg-emerald-50 rounded-lg text-center"><span class="block text-xs font-semibold text-emerald-600 uppercase tracking-wider">Sudah Dibeli</span><span id="stat-dibeli" class="text-2xl font-bold text-emerald-700">0</span></div>
                    <div class="p-3 bg-amber-50 rounded-lg text-center"><span class="block text-xs font-semibold text-amber-600 uppercase tracking-wider">Belum Dibeli</span><span id="stat-belum" class="text-2xl font-bold text-amber-700">0</span></div>
                    <div class="p-3 bg-teal-50 rounded-lg text-center"><span class="block text-xs font-semibold text-teal-600 uppercase tracking-wider">Total Belanja</span><span id="stat-harga" class="text-xl font-bold text-teal-700">Rp 0</span></div>
                </div>

                <div class="bg-white rounded-xl shadow-xs border border-slate-100 p-5">
                    <h2 class="text-md font-bold text-slate-700 mb-3">➕ Tambah Item Baru</h2>
                    <form id="form-tambah" class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Nama Item/Bumbu</label><input type="text" id="input-nama" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="Contoh: Ketumbar"></div>
                        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Kategori</label><select id="input-kategori" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm"><option value="BUMBU SEGAR & EMPON-EMPON">BUMBU SEGAR & EMPON-EMPON</option><option value="BUMBU KERING & REMPAH">BUMBU KERING & REMPAH</option><option value="BAHAN RACIKAN & KEBUTUHAN LAIN">BAHAN RACIKAN & KEBUTUHAN LAIN</option></select></div>
                        <div><label class="block text-xs font-semibold text-slate-500 mb-1">Keterangan / Catatan</label><div class="flex gap-2"><input type="text" id="input-ket" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="Opsional..."><button type="submit" class="bg-emerald-600 text-white font-semibold text-sm px-4 py-2 rounded-lg shrink-0">Tambah</button></div></div>
                    </form>
                </div>

                <div id="loading-state" class="text-center py-8 text-slate-400 font-medium hidden">Sinkronisasi Google Sheets...</div>
                <div id="lists-container" class="space-y-8"></div>
            </div>

            <div id="konten-admin" class="bg-white rounded-xl shadow-xs border border-indigo-100 p-6 border-l-4 border-l-indigo-500 hidden">
                <h2 class="text-base font-bold text-indigo-950 mb-4 flex items-center gap-2">⚙️ Menu Admin: Manajemen Pengguna</h2>
                
                <form id="form-register" class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end mb-6 pb-6 border-b border-slate-100">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Username Baru</label>
                        <input type="text" id="reg-username" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-hidden" placeholder="Nama user...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Password</label>
                        <input type="password" id="reg-password" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-hidden" placeholder="Kunci sandi...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Hak Akses (Role)</label>
                        <select id="reg-role" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs outline-hidden">
                            <option value="Admin">Admin</option>
                            <option value="User">User Biasa</option>
                        </select>
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-xs px-4 py-2 rounded-lg transition-colors shadow-xs">Simpan User</button>
                </form>

                <div>
                    <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">Daftar Pengguna Saat Ini:</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-slate-600">
                                    <th class="p-2 font-semibold">Username</th>
                                    <th class="p-2 font-semibold">Role / Hak Akses</th>
                                    <th class="p-2 font-semibold text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-user-list" class="divide-y divide-slate-100 text-slate-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // PENTING: Ganti dengan URL hasil Deployment Apps Script Anda
        const API_URL = "https://script.google.com/macros/s/AKfycbxdUNhQML5g7NzqVJQ29fJKrTyw32KrM7aHKCEW_MBKpP21uZgkD3aC2wi6vBDktF3U1g/exec"; 

        let shoppingItems = [];
        let statusSesi = { isLoggedIn: false, username: "", role: "" };
        let reloadTimer;

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("form-login").addEventListener("submit", handleLogin);
            document.getElementById("form-register").addEventListener("submit", handleRegister);
            document.getElementById("form-tambah").addEventListener("submit", handleAddItem);
            
            const simpananSesi = localStorage.getItem("sesi_belanja");
            if (simpananSesi) {
                statusSesi = JSON.parse(simpananSesi);
                bukaHalamanUtama();
            }
        });

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value.trim();

            fetch(`${API_URL}?action=login`, {
                method: "POST",
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.sukses) {
                    statusSesi = { isLoggedIn: true, username: username, role: data.role };
                    localStorage.setItem("sesi_belanja", JSON.stringify(statusSesi));
                    bukaHalamanUtama();
                } else {
                    alert(data.pesan);
                }
            }).catch(err => alert("Gagal memproses login, periksa koneksi atau API_URL!"));
        }

        function bukaHalamanUtama() {
            document.getElementById("halaman-login").classList.add("hidden");
            document.getElementById("halaman-utama").classList.remove("hidden");
            document.getElementById("user-aktif").innerText = statusSesi.username;
            document.getElementById("role-aktif").innerText = statusSesi.role;

            // Kontrol Tampilan Khusus Akses Admin
            if (statusSesi.role === "Admin") {
                document.getElementById("navigasi-tab").classList.remove("hidden");
                loadUserList();
            } else {
                document.getElementById("navigasi-tab").classList.add("hidden");
            }
            
            // Default selalu menampilkan halaman belanja saat buka aplikasi
            gantiTab('belanja');
            
            loadDataFromSheets();
            pasangPendeteksiAktifitasReload();
            jalankanReloadOtomatis();
        }

        // FUNGSI UNTUK PERPINDAHAN TAB HALAMAN (KHUSUS ADMIN)
        function gantiTab(targetTab) {
            const tabBelanja = document.getElementById("konten-belanja");
            const tabAdmin = document.getElementById("konten-admin");
            const btnBelanja = document.getElementById("btn-tab-belanja");
            const btnAdmin = document.getElementById("btn-tab-admin");

            if (targetTab === 'belanja') {
                tabBelanja.classList.remove("hidden");
                tabAdmin.classList.add("hidden");
                
                // Ubah gaya tombol aktif
                btnBelanja.className = "border-b-2 border-emerald-600 text-emerald-600 py-4 px-6 text-sm font-bold transition-colors focus:outline-hidden";
                btnAdmin.className = "border-b-2 border-transparent text-slate-500 hover:text-slate-700 py-4 px-6 text-sm font-semibold transition-colors focus:outline-hidden";
            } else if (targetTab === 'admin' && statusSesi.role === "Admin") {
                tabBelanja.classList.add("hidden");
                tabAdmin.classList.remove("hidden");
                
                // Ubah gaya tombol aktif
                btnBelanja.className = "border-b-2 border-transparent text-slate-500 hover:text-slate-700 py-4 px-6 text-sm font-semibold transition-colors focus:outline-hidden";
                btnAdmin.className = "border-b-2 border-indigo-600 text-indigo-600 py-4 px-6 text-sm font-bold transition-colors focus:outline-hidden";
                loadUserList();
            }
        }

        // AMBIL DAFTAR USER DARI SPREADSHEET
        function loadUserList() {
            if (statusSesi.role !== "Admin") return;
            fetch(`${API_URL}?action=read_users`)
            .then(res => res.json())
            .then(users => {
                const tbody = document.getElementById("tabel-user-list");
                tbody.innerHTML = "";
                users.forEach(user => {
                    const row = document.createElement("tr");
                    row.className = "border-b border-slate-100 hover:bg-slate-50";
                    
                    const isSelf = user.username === statusSesi.username;
                    const tombolHapus = isSelf 
                        ? `<span class="text-slate-400 italic text-xs">Anda</span>`
                        : `<button onclick="handleDeleteUser('${user.username}')" class="text-red-600 hover:text-red-800 font-semibold px-2 py-1">Hapus</button>`;

                    row.innerHTML = `
                        <td class="p-2 font-medium text-slate-800">${user.username}</td>
                        <td class="p-2"><span class="px-2 py-0.5 rounded text-xs font-semibold ${user.role === 'Admin' ? 'bg-indigo-50 text-indigo-700' : 'bg-slate-100 text-slate-600'}">${user.role}</span></td>
                        <td class="p-2 text-center">${tombolHapus}</td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        // PROSES REGISTER USER BARU
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById("reg-username").value.trim();
            const password = document.getElementById("reg-password").value.trim();
            const role = document.getElementById("reg-role").value;

            fetch(`${API_URL}?action=register`, {
                method: "POST",
                body: JSON.stringify({ username, password, role })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.pesan);
                if(data.sukses) {
                    document.getElementById("reg-username").value = "";
                    document.getElementById("reg-password").value = "";
                    loadUserList();
                }
            });
        }

        // PROSES HAPUS USER
        function handleDeleteUser(usernameTarget) {
            if (!confirm(`Apakah Anda yakin ingin menghapus user "${usernameTarget}"?`)) return;

            fetch(`${API_URL}?action=delete_user`, {
                method: "POST",
                body: JSON.stringify({ username: usernameTarget })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.pesan);
                if (data.sukses) {
                    loadUserList();
                }
            });
        }

        function handleLogout() {
            localStorage.removeItem("sesi_belanja");
            window.location.reload();
        }

        // OPERASI DATA DAFTAR BELANJAAN (CRUD)
        function loadDataFromSheets() {
            const loader = document.getElementById("loading-state");
            loader.classList.remove("hidden");
            fetch(`${API_URL}?action=read`)
                .then(res => res.json())
                .then(data => { shoppingItems = data; renderApp(); })
                .finally(() => loader.classList.add("hidden"));
        }

        function renderApp() {
            const container = document.getElementById("lists-container");
            container.innerHTML = "";
            const categories = ["BUMBU SEGAR & EMPON-EMPON", "BUMBU KERING & REMPAH", "BAHAN RACIKAN & KEBUTUHAN LAIN"];
            
            categories.forEach(cat => {
                const itemsInCat = shoppingItems.filter(item => item.kategori === cat);
                const section = document.createElement("div");
                section.className = "bg-white rounded-xl border border-slate-100 overflow-hidden mb-4 shadow-xs";
                section.innerHTML = `<div class="bg-slate-50 border-b border-slate-100 px-5 py-3 flex justify-between items-center"><h3 class="font-bold text-sm text-slate-700">${cat}</h3></div>`;
                
                const listGroup = document.createElement("div");
                listGroup.className = "divide-y divide-slate-100";
                
                itemsInCat.forEach(item => {
                    const row = document.createElement("div");
                    row.className = "p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3";
                    row.innerHTML = `<div class="flex items-start gap-3 flex-1">
                        <input type="checkbox" ${item.selesai ? 'checked' : ''} class="w-5 h-5 rounded text-emerald-600 mt-0.5" onchange="handleToggleCheck('${item.id}', this.checked)">
                        <div><span class="text-sm font-semibold block ${item.selesai ? 'strikethrough' : 'text-slate-800'}">${item.nama}</span><span class="text-xs text-slate-400 block">${item.ket}</span></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="flex items-center bg-slate-100 rounded px-2 py-1 border text-xs"><span>Rp</span><input type="number" value="${item.harga || ''}" class="bg-transparent w-20 text-right font-semibold" onblur="handlePriceChange('${item.id}', this.value)"></div>
                        <button class="text-slate-400 hover:text-rose-500 text-xs px-2" onclick="handleDeleteItem('${item.id}')">Hapus</button>
                    </div>`;
                    listGroup.appendChild(row);
                });
                section.appendChild(listGroup); container.appendChild(section);
            });
            updateSummaryCounters();
        }

        function updateSummaryCounters() {
            const total = shoppingItems.length; const dibeli = shoppingItems.filter(i => i.selesai).length; const belum = total - dibeli;
            const totalHarga = shoppingItems.reduce((acc, curr) => acc + (Number(curr.harga) || 0), 0);
            document.getElementById("stat-total").innerText = total; document.getElementById("stat-dibeli").innerText = dibeli;
            document.getElementById("stat-belum").innerText = belum; document.getElementById("stat-harga").innerText = "Rp " + totalHarga.toLocaleString("id-ID");
        }

        function handleAddItem(e) {
            e.preventDefault(); const nama = document.getElementById("input-nama").value; const kategori = document.getElementById("input-kategori").value; const ket = document.getElementById("input-ket").value; const id = "ID_" + Date.now();
            const newItem = { id, kategori, nama, ket, selesai: false, harga: 0 };
            fetch(`${API_URL}?action=create`, { method: "POST", body: JSON.stringify(newItem) }).then(() => { shoppingItems.push(newItem); renderApp(); });
            document.getElementById("input-nama").value = ""; document.getElementById("input-ket").value = "";
        }

        function handleToggleCheck(id, isChecked) {
            const idx = shoppingItems.findIndex(i => i.id == id);
            if(idx !== -1) {
                shoppingItems[idx].selesai = isChecked; renderApp();
                fetch(`${API_URL}?action=update`, { method: "POST", body: JSON.stringify({ id, selesai: isChecked }) });
            }
        }

        function handlePriceChange(id, value) {
            const price = Number(value) || 0; const idx = shoppingItems.findIndex(i => i.id == id);
            if(idx !== -1) {
                shoppingItems[idx].harga = price; updateSummaryCounters();
                fetch(`${API_URL}?action=update`, { method: "POST", body: JSON.stringify({ id, harga: price }) });
            }
        }

        function handleDeleteItem(id) {
            if(!confirm("Hapus item?")) return;
            fetch(`${API_URL}?action=delete`, { method: "POST", body: JSON.stringify({ id }) }).then(() => { shoppingItems = shoppingItems.filter(i => i.id != id); renderApp(); });
        }

        // REFRESH DATA SETELAH 7 DETIK KONDISI IDLE
        function jalankanReloadOtomatis() {
            if (!statusSesi.isLoggedIn) return; 
            clearTimeout(reloadTimer);
            reloadTimer = setTimeout(() => {
                console.log("Idle 7 detik. Menyegarkan data otomatis...");
                loadDataFromSheets();
                if(statusSesi.role === "Admin") loadUserList(); 
            }, 7000);
        }

        function pasangPendeteksiAktifitasReload() {
            const daftarEvent = ['mousemove', 'mousedown', 'keypress', 'touchstart', 'scroll'];
            daftarEvent.forEach(namaEvent => {
                window.addEventListener(namaEvent, jalankanReloadOtomatis, true);
            });
        }
    </script>
</body>
</html>
